name: Build NanoClaw riscv64 image

on:
  workflow_dispatch:
    inputs:
      nanoclaw_version:
        description: 'NanoClaw version tag to build'
        required: true
        default: 'main'
  schedule:
    - cron: '0 4 * * 1'  # Weekly, Monday 04:00 UTC

jobs:
  build:
    runs-on: [self-hosted, riscv64]
    permissions:
      contents: read
      packages: write
    env:
      NANOCLAW_VERSION: ${{ inputs.nanoclaw_version || 'latest' }}

    steps:
      - name: Checkout upstream NanoClaw
        uses: actions/checkout@v4
        with:
          repository: qwibitai/nanoclaw
          ref: ${{ inputs.nanoclaw_version || 'main' }}

      - name: Overlay riscv64 files from fork
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            container/Dockerfile.riscv64
          sparse-checkout-cone-mode: false
          path: _fork

      - name: Copy riscv64 Dockerfile
        run: cp _fork/container/Dockerfile.riscv64 container/

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        env:
          GHCR: ghcr.io/${{ github.repository_owner }}/nanoclaw
          DHUB: ${{ secrets.DOCKERHUB_USERNAME }}/nanoclaw
        run: |
          cd container
          time docker build \
            -f Dockerfile.riscv64 \
            -t "${GHCR}:${NANOCLAW_VERSION}-riscv64" \
            -t "${GHCR}:riscv64" \
            -t "${DHUB}:${NANOCLAW_VERSION}-riscv64" \
            -t "${DHUB}:riscv64" \
            .

          docker push --all-tags "${GHCR}"
          docker push --all-tags "${DHUB}"

  smoke-test:
    needs: build
    runs-on: [self-hosted, riscv64]
    env:
      NANOCLAW_VERSION: ${{ inputs.nanoclaw_version || 'latest' }}
    steps:
      - name: Pull image from Docker Hub
        env:
          DHUB: ${{ secrets.DOCKERHUB_USERNAME }}/nanoclaw
        run: |
          docker pull "${DHUB}:${NANOCLAW_VERSION}-riscv64"

      - name: Smoke test — agent SDK initializes
        env:
          DHUB: ${{ secrets.DOCKERHUB_USERNAME }}/nanoclaw
        run: |
          OUTPUT=$(echo '{}' | timeout 60 docker run --rm -i \
            "${DHUB}:${NANOCLAW_VERSION}-riscv64" 2>&1) || true
          echo "${OUTPUT}"
          # NANOCLAW_OUTPUT_START proves the agent runner initialized and produced output
          # The actual response may be "Not logged in" or a status JSON — either is fine
          echo "${OUTPUT}" | grep -q "NANOCLAW_OUTPUT_START" \
            && echo "Smoke test PASSED — agent SDK produced output" \
            || (echo "Smoke test FAILED — no agent output detected" && exit 1)
          # Fail on missing vendored binaries (the ripgrep issue)
          if echo "${OUTPUT}" | grep -q "ENOENT"; then
            echo "Smoke test FAILED — missing binary detected"
            exit 1
          fi
